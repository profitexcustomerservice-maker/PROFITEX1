{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Shares Management</h1>
    <p class="page-subtitle">Manage investment plans and packages</p>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <select id="filter-type"
                style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                <option value="">All Types</option>
                <option value="basic">Basic</option>
                <option value="silver">Silver</option>
                <option value="gold">Gold</option>
            </select>
        </div>
        <button class="primary" onclick="showCreatePlanModal()">+ Create Plan</button>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;" id="plans-grid">
        <div class="loading">Loading plans...</div>
    </div>
</div>

<!-- Create/Edit Plan Modal -->
<div id="plan-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="plan-modal-title">Create Plan</h3>
            <span class="close" onclick="closePlanModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="plan-form">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Title</label>
                    <input type="text" name="title" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Description</label>
                    <textarea name="description" rows="3"
                        style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Plan Type</label>
                        <select name="plan_type" required
                            style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                            <option value="basic">Basic (Level 1)</option>
                            <option value="silver">Silver (Level 2)</option>
                            <option value="gold">Gold (Level 3)</option>
                            <option value="platinum">Platinum (Level 4)</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Price ($)</label>
                        <input type="number" name="amount" step="0.01" min="0" required
                            style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Reward Multiplier</label>
                        <input type="number" name="reward_multiplier" step="0.1" min="1" value="1" required
                            style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600">Daily Earning Limit
                            ($)</label>
                        <input type="number" name="daily_earning_limit" step="0.01" min="0" value="50" required
                            style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Max Tasks Per Day</label>
                    <input type="number" name="max_tasks_per_day" min="1" value="10" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Duration (days)</label>
                    <input type="number" name="duration" min="1" value="30" required
                        style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" onclick="closePlanModal()">Cancel</button>
                    <button type="submit" class="primary">Save Plan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .modal {
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
    }

    .modal-content {
        background: var(--bg-card);
        margin: 5% auto;
        padding: 32px;
        border: 1px solid var(--border);
        width: 90%;
        max-width: 600px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        animation: modalSlideIn 0.3s ease;
        max-height: 90vh;
        overflow-y: auto;
    }

    @keyframes modalSlideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }

        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-light);
    }

    .modal-header h3 {
        margin: 0;
        font-size: 1.5rem;
    }

    .close {
        color: var(--text-muted);
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        transition: color var(--transition);
    }

    .close:hover {
        color: var(--text);
    }

    .plan-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
        transition: var(--transition);
        position: relative;
        overflow: hidden;
    }

    .plan-card:hover {
        box-shadow: var(--shadow-lg);
        transform: translateY(-2px);
    }

    .plan-card.basic {
        border-top: 4px solid var(--info);
    }

    .plan-card.silver {
        border-top: 4px solid var(--text-secondary);
    }

    .plan-card.platinum {
        border-top: 4px solid #8b5cf6;
    }

    .plan-card.gold {
        border-top: 4px solid var(--warning);
    }

    .plan-type-badge {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
    }

    .plan-card.basic .plan-type-badge {
        background: var(--info-light);
        color: var(--info);
    }

    .plan-card.silver .plan-type-badge {
        background: var(--text-muted);
        color: white;
    }

    .plan-card.gold .plan-type-badge {
        background: var(--warning-light);
        color: var(--warning);
    }

    .plan-title {
        font-size: 1.25rem;
        font-weight: 700;
        margin-bottom: 8px;
    }

    .plan-price {
        font-size: 2rem;
        font-weight: 700;
        color: var(--primary);
        margin-bottom: 16px;
    }

    .plan-price span {
        font-size: 1rem;
        color: var(--text-secondary);
        font-weight: 400;
    }

    .plan-features {
        margin: 20px 0;
        padding: 20px 0;
        border-top: 1px solid var(--border-light);
        border-bottom: 1px solid var(--border-light);
    }

    .plan-feature {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 0.875rem;
    }

    .plan-feature svg {
        width: 18px;
        height: 18px;
        color: var(--success);
    }

    .plan-actions {
        display: flex;
        gap: 8px;
        margin-top: 16px;
    }

    label {
        font-size: 0.875rem;
    }

    input,
    select,
    textarea {
        font-size: 0.875rem;
    }
</style>

<script>
    let editingPlanId = null;
    let allPlans = [];

    window.addEventListener('DOMContentLoaded', () => {
        // Use server-rendered data first, then allow refresh
        try {
            allPlans = JSON.parse('{{ plans_json|escapejs }}');
            renderPlans(allPlans);
        } catch(e) {
            loadPlans();
        }
    });

    async function loadPlans() {
        try {
            const response = await apiFetch('/api/plans/');
            const data = await handleJsonResponse(response);

            const container = document.getElementById('plans-grid');
            const plans = Array.isArray(data) ? data : (data.results || []);

            if (plans.length === 0) {
                container.innerHTML = '<div class="no-data">No plans found. Create your first plan!</div>';
                return;
            }

            allPlans = plans;
            renderPlans(plans);
        } catch (error) {
            console.error('Error loading plans:', error);
            document.getElementById('plans-grid').innerHTML = '<div class="error">Error loading plans. Make sure you are logged in as admin.</div>';
        }
    }

    function getPlanMeta(planLevel) {
        if (planLevel === 4) return { cls: 'platinum', name: 'Platinum' };
        if (planLevel === 3) return { cls: 'gold',     name: 'Gold'     };
        if (planLevel === 2) return { cls: 'silver',   name: 'Silver'   };
        return { cls: 'basic', name: 'Basic' };
    }

    function renderPlans(plans) {
        const container = document.getElementById('plans-grid');
        if (!plans || plans.length === 0) {
            container.innerHTML = '<div class="no-data">No plans found. Create your first plan!</div>';
            return;
        }
        container.innerHTML = plans.map(plan => {
            const { cls, name } = getPlanMeta(plan.plan_level);
            return `
            <div class="plan-card ${cls}">
                <span class="plan-type-badge">${name}</span>
                <h3 class="plan-title">${plan.title || 'Untitled Plan'}</h3>
                <div class="plan-price">$${plan.amount || '0'}<span>/join</span></div>
                <p style="color: var(--text-secondary); font-size: 0.875rem; margin-bottom: 16px;">${plan.description || 'No description'}</p>
                <div class="plan-features">
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Reward Multiplier: ${plan.reward_multiplier || 1}x</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Daily Limit: $${plan.daily_earning_limit || 50}</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Max Tasks: ${plan.max_tasks_per_day || 10}/day</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Duration: ${plan.duration_days || 30} days</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Status: ${plan.active ? '✅ Active' : '❌ Inactive'}</span>
                    </div>
                </div>
                <div class="plan-actions">
                    <button onclick="editPlan('${plan.id}')" style="flex: 1;">Edit</button>
                    <button onclick="deletePlan('${plan.id}')" class="danger" style="flex: 1;">Delete</button>
                </div>
            </div>
        `;
        }).join('');
    }

    function showCreatePlanModal() {
        editingPlanId = null;
        document.getElementById('plan-modal-title').textContent = 'Create Plan';
        document.getElementById('plan-form').reset();
        document.getElementById('plan-modal').style.display = 'block';
    }

    function editPlan(planId) {
        editingPlanId = planId;
        document.getElementById('plan-modal-title').textContent = 'Edit Plan';
        document.getElementById('plan-modal').style.display = 'block';

        const plan = allPlans.find(p => String(p.id) === String(planId));
        if (plan) {
            const form = document.getElementById('plan-form');
            form.querySelector('[name="title"]').value = plan.title || '';
            form.querySelector('[name="description"]').value = plan.description || '';

            let planType = 'basic';
            if (plan.plan_level === 4) planType = 'platinum';
            else if (plan.plan_level === 3) planType = 'gold';
            else if (plan.plan_level === 2) planType = 'silver';

            form.querySelector('[name="plan_type"]').value = planType;
            form.querySelector('[name="amount"]').value = plan.amount || '';
            form.querySelector('[name="reward_multiplier"]').value = plan.reward_multiplier || 1;
            form.querySelector('[name="daily_earning_limit"]').value = plan.daily_earning_limit || 50;
            form.querySelector('[name="max_tasks_per_day"]').value = plan.max_tasks_per_day || 10;
            form.querySelector('[name="duration"]').value = plan.duration_days || 30;
        } else {
            // Fallback: fetch from API
            apiFetch(`/api/plans/${planId}/`)
                .then(handleJsonResponse)
                .then(plan => {
                    const form = document.getElementById('plan-form');
                    form.querySelector('[name="title"]').value = plan.title || '';
                    form.querySelector('[name="description"]').value = plan.description || '';
                    let planType = 'basic';
                    if (plan.plan_level === 4) planType = 'platinum';
                    else if (plan.plan_level === 3) planType = 'gold';
                    else if (plan.plan_level === 2) planType = 'silver';
                    form.querySelector('[name="plan_type"]').value = planType;
                    form.querySelector('[name="amount"]').value = plan.amount || '';
                    form.querySelector('[name="reward_multiplier"]').value = plan.reward_multiplier || 1;
                    form.querySelector('[name="daily_earning_limit"]').value = plan.daily_earning_limit || 50;
                    form.querySelector('[name="max_tasks_per_day"]').value = plan.max_tasks_per_day || 10;
                    form.querySelector('[name="duration"]').value = plan.duration_days || 30;
                })
                .catch(() => showToast('Error loading plan details', 'error'));
        }
    }

    function closePlanModal() {
        document.getElementById('plan-modal').style.display = 'none';
        editingPlanId = null;
    }

    document.getElementById('plan-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const formData = new FormData(this);
        const pType = formData.get('plan_type');
        let planLevel = 1;
        if (pType === 'platinum') planLevel = 4;
        else if (pType === 'gold')     planLevel = 3;
        else if (pType === 'silver')   planLevel = 2;

        const data = {
            title: formData.get('title'),
            description: formData.get('description'),
            plan_level: planLevel,
            amount: parseFloat(formData.get('amount')),
            reward_multiplier: parseFloat(formData.get('reward_multiplier')),
            daily_earning_limit: parseFloat(formData.get('daily_earning_limit')),
            max_tasks_per_day: parseInt(formData.get('max_tasks_per_day')),
            duration_days: parseInt(formData.get('duration')),
            active: true
        };

        const submitBtn = e.target.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Saving...';

        try {
            const url = editingPlanId ? `/api/plans/${editingPlanId}/` : '/api/plans/';
            const method = editingPlanId ? 'PUT' : 'POST';

            const response = await apiFetch(url, {
                method: method,
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showToast(editingPlanId ? 'Plan updated successfully' : 'Plan created successfully', 'success');
                closePlanModal();
                await loadPlans();
            } else {
                const errData = await response.json().catch(() => ({}));
                const errMsg = typeof errData === 'object' ? JSON.stringify(errData) : 'Error saving plan';
                showToast('Error: ' + errMsg, 'error');
            }
        } catch (error) {
            console.error('Error saving plan:', error);
            showToast('Error saving plan', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Plan';
        }
    });

    async function deletePlan(planId) {
        if (!confirm('Are you sure you want to delete this plan?')) {
            return;
        }

        try {
            const response = await apiFetch(`/api/plans/${planId}/`, {
                method: 'DELETE'
            });

            if (response.ok) {
                showToast('Plan deleted successfully', 'success');
                loadPlans();
            } else {
                showToast('Error deleting plan', 'error');
            }
        } catch (error) {
            console.error('Error deleting plan:', error);
            showToast('Error deleting plan', 'error');
        }
    }

    // Close modal when clicking outside
    window.onclick = function (event) {
        const modal = document.getElementById('plan-modal');
        if (event.target === modal) {
            closePlanModal();
        }
    }
</script>
{% endblock %}
