{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Crypto Deposits</h1>
    <p class="page-subtitle">Verify and approve blockchain deposits</p>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <select id="filter-status" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                <option value="">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="APPROVED">Approved</option>
                <option value="REJECTED">Rejected</option>
            </select>
        </div>
        <button onclick="loadCryptoDeposits()">Refresh</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="table">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Method</th>
                    <th>Amount</th>
                    <th>Hash / Proof</th>
                    <th>Status</th>
                    <th>Submitted</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="crypto-table-body">
                <tr>
                    <td colspan="7">
                        <div class="loading">Loading crypto deposits...</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Proof Modal -->
<div id="proof-modal" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:12px; max-width:90%; max-height:90%; position:relative;">
        <span onclick="closeModal()" style="position:absolute; right:15px; top:10px; font-size:24px; cursor:pointer;">&times;</span>
        <img id="modal-img" src="" style="max-width:100%; max-height:80vh; display:block; margin:auto;">
        <div id="modal-hash" style="margin-top:15px; font-family:monospace; word-break:break-all; padding:10px; background:#f5f5f5; border-radius:6px;"></div>
    </div>
</div>

<script>
window.addEventListener('DOMContentLoaded', () => {
    const data = JSON.parse('{{ deposits_json|escapejs }}');
    renderCryptoDeposits(data);
});

async function loadCryptoDeposits() {
    const status = document.getElementById('filter-status').value;
    try {
        const response = await apiFetch(`/admin_panel/api/crypto-deposits/?status=${status}`);
        if (response.ok) {
            const data = await response.json();
            renderCryptoDeposits(data.results || []);
        }
    } catch (e) { console.error(e); }
}

function renderCryptoDeposits(data) {
    const container = document.getElementById('crypto-table-body');
    if (!data.length) {
        container.innerHTML = '<tr><td colspan="7"><div class="no-data">No crypto deposits found</div></td></tr>';
        return;
    }

    container.innerHTML = data.map(dep => `
        <tr>
            <td>
                <div style="font-weight:600;">${dep.username || 'User #'+dep.user}</div>
                <div style="font-size:0.75rem; color:var(--text-muted);">ID: ${dep.id}</div>
            </td>
            <td>
                <div style="font-weight:600;">${dep.payment_method_name}</div>
                <div style="font-size:0.75rem; color:var(--text-muted);">${dep.payment_method_network}</div>
            </td>
            <td>
                <div style="font-weight:700; color:var(--success);">$${parseFloat(dep.amount).toFixed(2)}</div>
            </td>
            <td>
                <div style="font-family:monospace; font-size:0.75rem; max-width:150px; overflow:hidden; text-overflow:ellipsis;" title="${dep.transaction_hash}">
                    ${dep.transaction_hash}
                </div>
                ${dep.proof_image ? `<a href="javascript:void(0)" onclick="openProof('${dep.proof_image}', '${dep.transaction_hash}')" style="font-size:0.75rem; color:var(--primary);">View proof</a>` : '<span style="font-size:0.75rem; color:var(--text-muted);">No image</span>'}
            </td>
            <td>
                <span class="badge ${getStatusBadgeClass(dep.status)}">${dep.status}</span>
            </td>
            <td>${formatDate(dep.created_at)}</td>
            <td>
                <div style="display:flex; gap:8px;">
                    ${dep.status === 'PENDING' ? `
                        <button onclick="updateStatus('${dep.id}', 'approve')" class="success" style="padding:6px 10px; font-size:0.7rem;">Approve</button>
                        <button onclick="updateStatus('${dep.id}', 'reject')" class="danger" style="padding:6px 10px; font-size:0.7rem;">Reject</button>
                    ` : '<span style="color:var(--text-muted); font-size:0.75rem;">Processed</span>'}
                </div>
            </td>
        </tr>
    `).join('');
}

async function updateStatus(id, action) {
    if (!confirm(`Are you sure you want to ${action} this deposit?`)) return;
    try {
        const response = await apiFetch(`/admin_panel/api/crypto-deposits/${id}/${action}/`, { method: 'POST' });
        if (response.ok) {
            showToast(`Deposit ${action}ed successfully`, 'success');
            loadCryptoDeposits();
        } else {
            const err = await response.json();
            showToast(err.error || `Error ${action}ing deposit`, 'error');
        }
    } catch (e) { showToast('Connection error', 'error'); }
}

function openProof(url, hash) {
    document.getElementById('modal-img').src = url;
    document.getElementById('modal-hash').innerText = 'Hash: ' + hash;
    document.getElementById('proof-modal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('proof-modal').style.display = 'none';
}

function getStatusBadgeClass(s) {
    if (s === 'PENDING') return 'warning';
    if (s === 'APPROVED') return 'success';
    if (s === 'REJECTED') return 'danger';
    return 'info';
}

function formatDate(ds) {
    const d = new Date(ds);
    return d.toLocaleString();
}
</script>
{% endblock %}
