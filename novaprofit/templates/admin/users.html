{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Users Management</h1>
    <p class="page-subtitle">Manage all system users</p>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <input type="text" id="search-users" placeholder="Search users..." style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); width: 300px;">
            <select id="filter-status" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="blocked">Blocked</option>
            </select>
        </div>
        <button class="primary" onclick="loadUsers()">Refresh</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="table">
            <thead>
                <tr>
                    <th>Avatar</th>
                    <th>User</th>
                    <th>Email</th>
                    <th>Plan</th>
                    <th>Status</th>
                    <th>Balance</th>
                    <th>Tasks</th>
                    <th>Last Active</th>
                    <th>Joined</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="users-table-body">
                <tr>
                    <td colspan="8">
                        <div class="loading">Loading users...</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="pagination" class="pagination" style="margin-top: 20px;"></div>
</div>

<!-- User Details Modal -->
<div id="user-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3>User Details</h3>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>
        <div class="modal-body" id="user-modal-body">
            <div class="loading">Loading user details...</div>
        </div>
    </div>
</div>

<style>
.modal {
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
}

.modal-content {
    background: var(--bg-card);
    margin: 10% auto;
    padding: 32px;
    border: 1px solid var(--border);
    width: 90%;
    max-width: 600px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    animation: modalSlideIn 0.3s ease;
}

@keyframes modalSlideIn {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-light);
}

.modal-header h3 {
    margin: 0;
    font-size: 1.5rem;
}

.close {
    color: var(--text-muted);
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    transition: color var(--transition);
}

.close:hover {
    color: var(--text);
}

.user-detail-row {
    display: flex;
    padding: 12px 0;
    border-bottom: 1px solid var(--border-light);
}

.user-detail-label {
    width: 150px;
    font-weight: 600;
    color: var(--text-secondary);
}

.user-detail-value {
    flex: 1;
}

.action-buttons {
    display: flex;
    gap: 8px;
}

.pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
}

.pagination button {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    border-radius: var(--radius-sm);
    font-size: 0.875rem;
}

.pagination button:hover {
    background: var(--primary-light);
    border-color: var(--primary);
}

.pagination button.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}
</style>

<script>
let currentPage = 1;
let totalPages = 1;

window.addEventListener('DOMContentLoaded', () => {
    // Use users data passed from server
    const usersData = JSON.parse('{{ users_json|escapejs }}');
    renderUsers(usersData);
});

async function loadUsers() {
    try {
        const response = await apiFetch('/admin_panel/api/users/');
        if (response.ok) {
            const data = await response.json();
            if (data.success) {
                renderUsers(data.results || []);
            } else {
                showToast(data.error || 'Error loading users', 'error');
            }
        } else {
            showToast('Error loading users', 'error');
        }
    } catch (error) {
        console.error('Error loading users:', error);
        showToast('Error loading users', 'error');
    }
}

function renderUsers(data) {
    const container = document.getElementById('users-table-body');
    
    if (data.length === 0) {
        container.innerHTML = '<tr><td colspan="10"><div class="no-data">No users found</div></td></tr>';
        return;
    }

    container.innerHTML = data.map(user => `
        <tr>
            <td>
                <div style="width: 40px; height: 40px; border-radius: 50%; overflow: hidden; background: var(--gradient-primary); display: flex; align-items: center; justify-content: center;">
                    ${user.profile_image ? `<img src="${user.profile_image}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">` : `<span style="color:white; font-weight:600;">${user.email ? user.email.charAt(0).toUpperCase() : 'U'}</span>`}
                </div>
            </td>
            <td>
                <div style="font-weight: 600;">${user.first_name || ''} ${user.last_name || ''}</div>
            </td>
            <td>${user.email || 'N/A'}</td>
            <td><span class="badge info">${user.plan_name || 'No Plan'}</span></td>
            <td>
                <span class="badge ${user.is_active ? 'success' : 'danger'}">
                    ${user.is_active ? 'Active' : 'Blocked'}
                </span>
            </td>
            <td>${user.wallet_balance !== undefined ? '$' + parseFloat(user.wallet_balance).toFixed(2) : '$0.00'}</td>
            <td>${user.tasks_completed || 0}</td>
            <td>${user.last_active ? formatDate(user.last_active) : 'Never'}</td>
            <td>${user.created_at ? formatDate(user.created_at) : 'N/A'}</td>
            <td>
                <div class="action-buttons">
                    <button onclick="viewUserDetails('${user.id}')" style="padding: 6px 12px; font-size: 0.75rem;">View</button>
                    <button onclick="toggleUserStatus('${user.id}', ${user.is_active})" class="${user.is_active ? 'danger' : 'success'}" style="padding: 6px 12px; font-size: 0.75rem;">
                        ${user.is_active ? 'Block' : 'Unblock'}
                    </button>
                    <button onclick="deleteUser('${user.id}')" class="danger" style="padding: 6px 12px; font-size: 0.75rem;">Delete</button>
                </div>
            </td>
        </tr>
    `).join('');
}

async function viewUserDetails(userId) {
    document.getElementById('user-modal').style.display = 'block';
    const container = document.getElementById('user-modal-body');
    container.innerHTML = '<div class="loading">Loading user details...</div>';

    try {
        const response = await apiFetch(`/admin_panel/api/users/${userId}/`);
        if (response.ok) {
            const data = await response.json();
            if (data.success && data.data) {
                const user = data.data;
                container.innerHTML = `
                    <div class="user-detail-row">
                        <div class="user-detail-label">Email:</div>
                        <div class="user-detail-value">${user.email || 'N/A'}</div>
                    </div>
                    <div class="user-detail-row">
                        <div class="user-detail-label">Name:</div>
                        <div class="user-detail-value">${user.first_name || ''} ${user.last_name || ''}</div>
                    </div>
                    <div class="user-detail-row">
                        <div class="user-detail-label">Avatar:</div>
                        <div class="user-detail-value">
                            ${user.profile_image ? `<img src="${user.profile_image}" alt="Avatar" style="max-width:120px; max-height:120px; border-radius:12px;">` : '<span style="color: var(--text-muted);">No profile image</span>'}
                        </div>
                    </div>
                    <div class="user-detail-row">
                        <div class="user-detail-label">Status:</div>
                        <div class="user-detail-value">
                            <span class="badge ${user.is_active ? 'success' : 'danger'}">
                                ${user.is_active ? 'Active' : 'Blocked'}
                            </span>
                        </div>
                    </div>
                    <div class="user-detail-row">
                        <div class="user-detail-label">Joined:</div>
                        <div class="user-detail-value">${user.created_at ? formatDate(user.created_at) : 'N/A'}</div>
                    </div>
                    <div class="user-detail-row">
                        <div class="user-detail-label">Last Active:</div>
                        <div class="user-detail-value">${user.last_active ? formatDate(user.last_active) : 'Never'}</div>
                    </div>
                    <div class="user-detail-row">
                        <div class="user-detail-label">Is Admin:</div>
                        <div class="user-detail-value">${user.is_admin ? 'Yes' : 'No'}</div>
                    </div>
                `;
            } else {
                container.innerHTML = '<div class="error">Error loading user details</div>';
            }
        } else {
            container.innerHTML = '<div class="error">Error loading user details</div>';
        }
    } catch (error) {
        console.error('Error loading user details:', error);
        container.innerHTML = '<div class="error">Error loading user details</div>';
    }
}

async function toggleUserStatus(userId, currentStatus) {
    if (!confirm(`Are you sure you want to ${currentStatus ? 'block' : 'unblock'} this user?`)) {
        return;
    }

    try {
        const response = await apiFetch(`/admin_panel/api/users/${userId}/toggle-status/`, {
            method: 'POST'
        });
        if (response.ok) {
            const data = await response.json();
            if (data.success) {
                showToast(`User ${currentStatus ? 'blocked' : 'unblocked'} successfully`, 'success');
                loadUsers();
            } else {
                showToast(data.error || 'Error updating user status', 'error');
            }
        } else {
            showToast('Error updating user status', 'error');
        }
    } catch (error) {
        console.error('Error toggling user status:', error);
        showToast('Error updating user status', 'error');
    }
}

async function deleteUser(userId) {
    if (!confirm('Are you sure you want to permanently delete this user? This action cannot be undone.')) {
        return;
    }

    try {
        const response = await apiFetch(`/admin_panel/api/users/${userId}/delete/`, {
            method: 'POST'
        });

        if (response.ok) {
            const data = await response.json();
            if (data.success) {
                showToast('User deleted successfully', 'success');
                loadUsers();
            } else {
                showToast(data.error || 'Error deleting user', 'error');
            }
        } else {
            showToast('Error deleting user', 'error');
        }
    } catch (error) {
        console.error('Error deleting user:', error);
        showToast('Error deleting user', 'error');
    }
}

function closeModal() {
    document.getElementById('user-modal').style.display = 'none';
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
    });
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('user-modal');
    if (event.target === modal) {
        closeModal();
    }
}
</script>
{% endblock %}
