{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Tasks Management</h1>
    <p class="page-subtitle">Create and manage system tasks</p>
</div>

<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <div style="display: flex; gap: 12px; align-items: center;">
            <input type="text" id="search-tasks" placeholder="Search tasks..." style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md); width: 300px;">
            <select id="filter-type" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                <option value="">All Types</option>
                <option value="advertise">Advertisement</option>
                <option value="survey">Survey</option>
                <option value="study">Study</option>
            </select>
            <select id="filter-status" style="padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                <option value="">All Status</option>
                <option value="active">Active</option>
                <option value="inactive">Inactive</option>
            </select>
        </div>
        <button class="primary" onclick="showCreateTaskModal()">+ Create Task</button>
    </div>

    <div style="overflow-x: auto;">
        <table class="table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Type</th>
                    <th>Reward</th>
                    <th>Duration</th>
                    <th>Premium</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tasks-table-body">
                <tr>
                    <td colspan="8">
                        <div class="loading">Loading tasks...</div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="pagination" class="pagination" style="margin-top: 20px;"></div>
</div>

<!-- Create/Edit Task Modal -->
<div id="task-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="task-modal-title">Create Task</h3>
            <span class="close" onclick="closeTaskModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="task-form">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Title</label>
                    <input type="text" name="title" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Description</label>
                    <textarea name="description" rows="3" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);"></textarea>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Type</label>
                        <select name="task_type" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                            <option value="advertise">Advertisement</option>
                            <option value="survey">Survey</option>
                            <option value="study">Study</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Reward ($)</label>
                        <input type="number" name="reward" step="0.01" min="0" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Duration (seconds)</label>
                        <input type="number" name="required_duration" min="30" value="30" required style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                    <div>
                        <label style="display: block; margin-bottom: 8px; font-weight: 600;">Premium Only</label>
                        <select name="premium_only" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                            <option value="false">No</option>
                            <option value="true">Yes</option>
                        </select>
                    </div>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Status</label>
                    <select name="active" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                        <option value="true">Active</option>
                        <option value="false">Inactive</option>
                    </select>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Advertisement URL (for Ad tasks)</label>
                    <input type="url" name="ad_url" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div style="margin-bottom: 24px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 600;">Media (optional)</label>
                    <input type="file" name="media" accept="image/*,video/*" style="width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-md);">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" onclick="closeTaskModal()">Cancel</button>
                    <button type="submit" class="primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.modal {
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
}

.modal-content {
    background: var(--bg-card);
    margin: 5% auto;
    padding: 32px;
    border: 1px solid var(--border);
    width: 90%;
    max-width: 700px;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    animation: modalSlideIn 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
}

@keyframes modalSlideIn {
    from { transform: translateY(-50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border-light);
}

.modal-header h3 {
    margin: 0;
    font-size: 1.5rem;
}

.close {
    color: var(--text-muted);
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    transition: color var(--transition);
}

.close:hover {
    color: var(--text);
}

.pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
}

.pagination button {
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    border-radius: var(--radius-sm);
    font-size: 0.875rem;
}

.pagination button:hover {
    background: var(--primary-light);
    border-color: var(--primary);
}

.pagination button.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
}

label {
    font-size: 0.875rem;
}

input, select, textarea {
    font-size: 0.875rem;
}
</style>

<script>
let currentPage = 1;
let totalPages = 1;
let editingTaskId = null;

window.addEventListener('DOMContentLoaded', () => {
    // Use tasks data passed from server
    const tasksData = JSON.parse('{{ tasks_json|escapejs }}');
    renderTasks(tasksData);
});

function renderTasks(data) {
    const container = document.getElementById('tasks-table-body');
    
    if (data.length === 0) {
        container.innerHTML = '<tr><td colspan="8"><div class="no-data">No tasks found</div></td></tr>';
        return;
    }

    container.innerHTML = data.map(task => `
        <tr>
            <td>
                <div style="font-weight: 600;">${task.title || 'Untitled'}</div>
                <div style="font-size: 0.75rem; color: var(--text-muted);">${task.description ? task.description.substring(0, 50) + '...' : 'No description'}</div>
            </td>
            <td>
                <span class="badge info">${task.media_type || 'Image'}</span>
            </td>
            <td>$${task.reward || '0.00'}</td>
            <td>
                <span class="badge ${task.active ? 'success' : 'danger'}">
                    ${task.active ? 'Active' : 'Inactive'}
                </span>
            </td>
            <td>${task.created_at ? formatDate(task.created_at) : 'N/A'}</td>
            <td>
                <div style="display: flex; gap: 8px;">
                    <button onclick="editTask('${task.id}')" style="padding: 6px 12px; font-size: 0.75rem;">Edit</button>
                    <button onclick="deleteTask('${task.id}')" class="danger" style="padding: 6px 12px; font-size: 0.75rem;">Delete</button>
                </div>
            </td>
        </tr>
    `).join('');
}

function showCreateTaskModal() {
    editingTaskId = null;
    document.getElementById('task-modal-title').textContent = 'Create Task';
    document.getElementById('task-form').reset();
    document.getElementById('task-modal').style.display = 'block';
}

function editTask(taskId) {
    editingTaskId = taskId;
    document.getElementById('task-modal-title').textContent = 'Edit Task';
    document.getElementById('task-modal').style.display = 'block';
    
    apiFetch(`/api/tasks/${taskId}/`)
        .then(handleJsonResponse)
        .then(task => {
            const form = document.getElementById('task-form');
            form.querySelector('[name="title"]').value = task.title || '';
            form.querySelector('[name="description"]').value = task.description || '';
            form.querySelector('[name="task_type"]').value = task.task_type || 'advertise';
            form.querySelector('[name="reward"]').value = task.reward || '';
            form.querySelector('[name="required_duration"]').value = task.required_duration || 30;
            form.querySelector('[name="premium_only"]').value = task.premium_only ? 'true' : 'false';
            form.querySelector('[name="active"]').value = task.active ? 'true' : 'false';
            form.querySelector('[name="ad_url"]').value = task.ad_url || '';
        })
        .catch(error => {
            console.error('Error loading task:', error);
            showToast('Error loading task details', 'error');
        });
}

function closeTaskModal() {
    document.getElementById('task-modal').style.display = 'none';
    editingTaskId = null;
}

document.getElementById('task-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    const data = {
        title: formData.get('title'),
        description: formData.get('description'),
        task_type: formData.get('task_type'),
        reward: parseFloat(formData.get('reward')),
        required_duration: parseInt(formData.get('required_duration')),
        premium_only: formData.get('premium_only') === 'true',
        active: formData.get('active') === 'true',
        ad_url: formData.get('ad_url') || ''
    };

    try {
        const url = editingTaskId ? `/api/tasks/${editingTaskId}/` : '/api/tasks/';
        const method = editingTaskId ? 'PUT' : 'POST';
        
        const response = await apiFetch(url, {
            method: method,
            body: JSON.stringify(data)
        });
        
        if (response.ok) {
            showToast(editingTaskId ? 'Task updated successfully' : 'Task created successfully', 'success');
            closeTaskModal();
            loadTasks();
        } else {
            showToast('Error saving task', 'error');
        }
    } catch (error) {
        console.error('Error saving task:', error);
        showToast('Error saving task', 'error');
    }
});

async function deleteTask(taskId) {
    if (!confirm('Are you sure you want to delete this task?')) {
        return;
    }

    try {
        const response = await apiFetch(`/api/tasks/${taskId}/`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            showToast('Task deleted successfully', 'success');
            loadTasks();
        } else {
            showToast('Error deleting task', 'error');
        }
    } catch (error) {
        console.error('Error deleting task:', error);
        showToast('Error deleting task', 'error');
    }
}

function formatDate(dateString) {
    const date = new Date(dateString);
    return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    });
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('task-modal');
    if (event.target === modal) {
        closeTaskModal();
    }
}
</script>
{% endblock %}
