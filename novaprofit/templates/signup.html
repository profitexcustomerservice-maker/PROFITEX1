{% extends "base.html" %}

{% block content %}
<style>
/* ===== SIGNUP PAGE STYLES ===== */
.signup-container {
    min-height: calc(100vh - var(--header-height) - 400px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
}
.signup-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: 48px;
    box-shadow: var(--shadow-xl);
    border: 1px solid var(--border);
}
.signup-header {
    text-align: center;
    margin-bottom: 40px;
}
.signup-logo {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    background: var(--gradient-primary);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.signup-logo svg {
    width: 32px;
    height: 32px;
    color: white;
}
.signup-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
}
.signup-subtitle {
    font-size: 0.9375rem;
    color: var(--text-secondary);
}
.signup-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.form-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
}
.form-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 0.9375rem;
    font-family: var(--font-family);
    background: var(--bg);
    color: var(--text);
    transition: all var(--transition);
}
.form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.form-input::placeholder {
    color: var(--text-muted);
}
.signup-button {
    width: 100%;
    padding: 14px;
    background: var(--gradient-primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
}
.signup-button:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}
.signup-divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
}
.signup-divider::before,
.signup-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}
.signup-divider span {
    padding: 0 16px;
    font-size: 0.875rem;
    color: var(--text-muted);
}
.signup-footer {
    text-align: center;
    margin-top: 24px;
}
.signup-footer-text {
    font-size: 0.875rem;
    color: var(--text-secondary);
}
.signup-footer-link {
    color: var(--primary);
    font-weight: 500;
}
.signup-footer-link:hover {
    color: var(--primary-hover);
}
.error-message {
    background: var(--danger-light);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: var(--radius-md);
    font-size: 0.875rem;
    margin-bottom: 20px;
    border-left: 4px solid var(--danger);
}
.terms-text {
    font-size: 0.8125rem;
    color: var(--text-secondary);
    line-height: 1.5;
}
.terms-link {
    color: var(--primary);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
    .signup-card {
        padding: 32px 24px;
    }
    .signup-title {
        font-size: 1.5rem;
    }
}
</style>

<div class="signup-container">
    <div class="signup-card">
        <div class="signup-header">
            <div class="signup-logo">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="white" fill-opacity="0.2"/>
                    <path d="M16 8L24 16L16 24L8 16L16 8Z" fill="white"/>
                </svg>
            </div>
            <h1 class="signup-title">Create Account</h1>
            <p class="signup-subtitle">Join Profitex and start earning today</p>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="signup-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" class="form-input" placeholder="John" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" class="form-input" placeholder="Doe" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-input" placeholder="••••••••" required>
            </div>
            <p class="signup-footer-text">By creating an account, you agree to our Terms of Service and Privacy Policy.</p>
            <button type="submit" class="signup-button">Create Account</button>
        </form>

        <div class="signup-divider">
            <span>or</span>
        </div>

        <div class="signup-footer">
            <p class="signup-footer-text">Already have an account? <a href="/login/" class="signup-footer-link">Sign in</a></p>
        </div>
    </div>
</div>
{% endblock %}
