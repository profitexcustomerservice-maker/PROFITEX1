{% extends 'admin/base.html' %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Shares Management</h1>
    <p class="page-subtitle">Manage investment plans and packages</p>
</div>

<div class="card">
    <div class="page-controls">
        <div class="filter-group">
            <label for="filter-type" class="form-label">Plan type</label>
            <select id="filter-type" class="form-select">
                <option value="">All Types</option>
                <option value="basic">Basic</option>
                <option value="silver">Silver</option>
                <option value="gold">Gold</option>
                <option value="platinum">Platinum</option>
            </select>
        </div>
        <div class="action-group">
            <button class="primary" onclick="showCreatePlanModal()"><i class="fas fa-plus"></i> Create Plan</button>
        </div>
    </div>

    <div id="plans-grid" class="plans-grid">
        <div class="loading">Loading plans...</div>
    </div>
</div>

<!-- Create/Edit Plan Modal -->
<div id="plan-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="plan-modal-title">Create Plan</h3>
            <span class="close" onclick="closePlanModal()">&times;</span>
        </div>
        <div class="modal-body">
            <form id="plan-form">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" name="title" required class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea name="description" rows="3" class="form-textarea"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Badge Label</label>
                    <input type="text" name="badge_text" placeholder="Most popular, Best value, ..." class="form-input">
                </div>
                <div class="grid-2cols">
                    <div class="form-group">
                        <label class="form-label">Plan Type</label>
                        <select name="plan_level" required class="form-select">
                            <option value="1">Basic (Level 1)</option>
                            <option value="2">Silver (Level 2)</option>
                            <option value="3">Gold (Level 3)</option>
                            <option value="4">Platinum (Level 4)</option>
                        </select>
                        <div id="plan-level-warning" class="form-warning">This plan level already exists. Choose a different level.</div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Price ($)</label>
                        <input type="number" name="amount" step="0.01" min="0" required class="form-input">
                    </div>
                </div>
                <div class="grid-2cols">
                    <div class="form-group">
                        <label class="form-label">Reward Multiplier</label>
                        <input type="number" name="reward_multiplier" step="0.1" min="1" value="1" required class="form-input">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Daily Earning Limit ($)</label>
                        <input type="number" name="daily_earning_limit" step="0.01" min="0" value="50" required class="form-input">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Max Tasks Per Day</label>
                    <input type="number" name="max_tasks_per_day" min="1" value="10" required class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">Duration (days)</label>
                    <input type="number" name="duration" min="1" value="30" required class="form-input">
                </div>
                <div style="display: flex; gap: 12px; justify-content: flex-end;">
                    <button type="button" onclick="closePlanModal()"><i class="fas fa-times"></i> Cancel</button>
                    <button type="submit" class="primary"><i class="fas fa-save"></i> Save Plan</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    .modal {
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
    }

    .modal-content {
        background: var(--bg-card);
        margin: 5% auto;
        padding: 32px;
        border: 1px solid var(--border);
        width: 90%;
        max-width: 600px;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        animation: modalSlideIn 0.3s ease;
        max-height: 90vh;
        overflow-y: auto;
    }

    @keyframes modalSlideIn {
        from {
            transform: translateY(-50px);
            opacity: 0;
        }

        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-light);
    }

    .modal-header h3 {
        margin: 0;
        font-size: 1.5rem;
    }

    .close {
        color: var(--text-muted);
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
        transition: color var(--transition);
    }

    .close:hover {
        color: var(--text);
    }

    .page-controls {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 24px;
    }

    .filter-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 220px;
        width: 100%;
        max-width: 320px;
    }

    .form-label {
        font-size: 0.9rem;
        color: var(--text-secondary);
        font-weight: 600;
    }

    .button-icon,
    .tag-icon {
        margin-right: 8px;
        font-size: 0.9rem;
    }

    .form-select,
    .form-input,
    .form-textarea {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg-main);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        color: var(--text);
        font-size: 0.95rem;
        transition: border-color var(--transition), background var(--transition);
    }

    .form-select:focus,
    .form-input:focus,
    .form-textarea:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(255, 255, 255, 0.05);
    }

    .form-group {
        margin-bottom: 16px;
    }

    .grid-2cols {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 16px;
    }

    .form-warning {
        display: none;
        color: var(--danger);
        font-size: 0.9rem;
        margin-top: 8px;
    }

    .plans-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 24px;
    }

    .plan-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        padding: 26px;
        box-shadow: var(--shadow-sm);
        transition: transform var(--transition), box-shadow var(--transition);
        display: flex;
        flex-direction: column;
        min-height: 100%;
    }

    .plan-card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg);
    }

    .plan-card.basic {
        border-left: 4px solid var(--info);
    }

    .plan-card.silver {
        border-left: 4px solid var(--text-secondary);
    }

    .plan-card.gold {
        border-left: 4px solid var(--warning);
    }

    .plan-card.platinum {
        border-left: 4px solid #8b5cf6;
    }

    .plan-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: flex-start;
        margin-bottom: 18px;
    }

    .plan-title {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0;
        color: var(--text);
        line-height: 1.2;
    }

    .plan-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 8px 14px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
    }

    .plan-badge i,
    .plan-highlight i,
    .subscription-badge i,
    .plan-tag i {
        margin-right: 6px;
        font-size: 0.85rem;
    }

    .plan-price {
        font-size: 2rem;
        font-weight: 800;
        color: var(--primary);
        margin: 0;
    }

    .plan-price span {
        display: block;
        font-size: 0.9rem;
        color: var(--text-secondary);
        font-weight: 500;
        margin-top: 6px;
    }

    .plan-description {
        color: var(--text-secondary);
        font-size: 0.95rem;
        line-height: 1.7;
        margin: 0 0 22px;
    }

    .plan-features {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 22px;
        padding: 20px 0;
        border-top: 1px solid var(--border-light);
        border-bottom: 1px solid var(--border-light);
    }

    .plan-feature {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.92rem;
        color: var(--text);
    }

    .plan-feature svg {
        width: 18px;
        height: 18px;
        color: var(--success);
        flex-shrink: 0;
    }

    .plan-actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: auto;
    }

    .plan-highlight {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
        background: rgba(124, 58, 237, 0.12);
        color: var(--primary);
        margin-bottom: 20px;
        width: fit-content;
    }

    .plan-card.gold .plan-highlight {
        background: rgba(245, 158, 11, 0.12);
        color: var(--warning);
    }

    .plan-card.platinum .plan-highlight {
        background: rgba(124, 58, 237, 0.16);
        color: #8b5cf6;
    }

    .plan-card.silver .plan-highlight {
        background: rgba(148, 163, 184, 0.12);
        color: var(--text-secondary);
    }

    .plan-card.basic .plan-highlight {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
    }

    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
        background: rgba(16, 185, 129, 0.12);
        color: var(--success);
    }
</style>

<script>
    let editingPlanId = null;
    let allPlans = [];

    window.addEventListener('DOMContentLoaded', () => {
        // Use server-rendered data first, then allow refresh
        try {
            allPlans = JSON.parse('{{ plans_json|escapejs }}');
            renderPlans(allPlans);
        } catch(e) {
            loadPlans();
        }
    });

    async function loadPlans() {
        try {
            const response = await apiFetch('/api/plans/');
            const data = await handleJsonResponse(response);

            const container = document.getElementById('plans-grid');
            const plans = Array.isArray(data) ? data : (data.results || []);

            if (plans.length === 0) {
                container.innerHTML = '<div class="no-data">No plans found. Create your first plan!</div>';
                return;
            }

            allPlans = plans;
            renderPlans(plans);
        } catch (error) {
            console.error('Error loading plans:', error);
            document.getElementById('plans-grid').innerHTML = '<div class="error">Error loading plans. Make sure you are logged in as admin.</div>';
        }
    }

    function getPlanMeta(planLevel) {
        if (planLevel === 4) return { cls: 'platinum', name: 'Platinum', highlight: 'Best value' };
        if (planLevel === 3) return { cls: 'gold',     name: 'Gold',     highlight: 'Most popular' };
        if (planLevel === 2) return { cls: 'silver',   name: 'Silver',   highlight: '' };
        return { cls: 'basic', name: 'Basic', highlight: '' };
    }

    function renderPlans(plans) {
        const container = document.getElementById('plans-grid');
        if (!plans || plans.length === 0) {
            container.innerHTML = '<div class="no-data">No plans found. Create your first plan!</div>';
            return;
        }
        container.innerHTML = plans.map(plan => {
            const { cls, name, highlight } = getPlanMeta(plan.plan_level);
            const label = plan.badge_text?.trim() || highlight;
            return `
            <div class="plan-card ${cls}">
                <div class="plan-header">
                    <div>
                        <span class="plan-badge"><i class="fas fa-award"></i>${name}</span>
                        <h3 class="plan-title">${plan.title || 'Untitled Plan'}</h3>
                    </div>
                    <div class="plan-price">$${plan.amount || '0'}<span>/join</span></div>
                </div>
                ${label ? `<div class="plan-highlight"><i class="fas fa-tag"></i>${label}</div>` : ''}
                <p class="plan-description">${plan.description || 'No description provided.'}</p>
                <div class="plan-features">
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Reward Multiplier: ${plan.reward_multiplier || 1}x</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Daily Limit: $${plan.daily_earning_limit || 50}</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Max Tasks: ${plan.max_tasks_per_day || 10}/day</span>
                    </div>
                    <div class="plan-feature">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
                        <span>Duration: ${plan.duration_days || 30} days</span>
                    </div>
                </div>
                <div class="plan-actions">
                    <button type="button" class="primary"><i class="fas fa-edit"></i> Edit</button>
                    <button type="button" class="danger"><i class="fas fa-trash-alt"></i> Delete</button>
                </div>
            </div>
        `;
        }).join('');
    }

    function showCreatePlanModal() {
        editingPlanId = null;
        document.getElementById('plan-modal-title').textContent = 'Create Plan';
        document.getElementById('plan-form').reset();
        document.getElementById('plan-modal').style.display = 'block';
    }

    function editPlan(planId) {
        editingPlanId = planId;
        document.getElementById('plan-modal-title').textContent = 'Edit Plan';
        document.getElementById('plan-modal').style.display = 'block';

        const plan = allPlans.find(p => String(p.id) === String(planId));
        if (plan) {
            const form = document.getElementById('plan-form');
            form.querySelector('[name="title"]').value = plan.title || '';
            form.querySelector('[name="description"]').value = plan.description || '';
            form.querySelector('[name="badge_text"]').value = plan.badge_text || '';

            form.querySelector('[name="plan_level"]').value = plan.plan_level || 1;
            form.querySelector('[name="amount"]').value = plan.amount || '';
            form.querySelector('[name="reward_multiplier"]').value = plan.reward_multiplier || 1;
            form.querySelector('[name="daily_earning_limit"]').value = plan.daily_earning_limit || 50;
            form.querySelector('[name="max_tasks_per_day"]').value = plan.max_tasks_per_day || 10;
            form.querySelector('[name="duration"]').value = plan.duration_days || 30;
        } else {
            // Fallback: fetch from API
            apiFetch(`/api/plans/${planId}/`)
                .then(handleJsonResponse)
                .then(plan => {
                    const form = document.getElementById('plan-form');
                    form.querySelector('[name="title"]').value = plan.title || '';
                    form.querySelector('[name="description"]').value = plan.description || '';
                    form.querySelector('[name="plan_level"]').value = plan.plan_level || 1;
                    form.querySelector('[name="amount"]').value = plan.amount || '';
                    form.querySelector('[name="reward_multiplier"]').value = plan.reward_multiplier || 1;
                    form.querySelector('[name="daily_earning_limit"]').value = plan.daily_earning_limit || 50;
                    form.querySelector('[name="max_tasks_per_day"]').value = plan.max_tasks_per_day || 10;
                    form.querySelector('[name="duration"]').value = plan.duration_days || 30;
                })
                .catch(() => showToast('Error loading plan details', 'error'));
        }
    }

    function closePlanModal() {
        document.getElementById('plan-modal').style.display = 'none';
        editingPlanId = null;
    }

    function checkPlanLevelUnique() {
        const form = document.getElementById('plan-form');
        const warning = document.getElementById('plan-level-warning');
        if (!form || !warning) {
            return true;
        }

        const selectedLevel = parseInt(form.querySelector('[name="plan_level"]').value, 10);
        const duplicate = allPlans.some(plan => Number(plan.plan_level) === selectedLevel && String(plan.id) !== String(editingPlanId));

        if (duplicate) {
            warning.style.display = 'block';
            warning.textContent = 'This plan level already exists. Please choose a different level.';
            return false;
        }

        warning.style.display = 'none';
        return true;
    }

    document.addEventListener('DOMContentLoaded', () => {
        const planLevelSelect = document.querySelector('[name="plan_level"]');
        if (planLevelSelect) {
            planLevelSelect.addEventListener('change', checkPlanLevelUnique);
        }
    });

    document.getElementById('plan-form').addEventListener('submit', async function (e) {
        e.preventDefault();

        const submitButton = e.target.querySelector('button[type="submit"]');
        if (!checkPlanLevelUnique()) {
            showToast('Please select a different plan level before saving.', 'error');
            return;
        }

        const formData = new FormData(this);
        const planLevel = parseInt(formData.get('plan_level'), 10) || 1;

        const data = {
            title: formData.get('title'),
            description: formData.get('description'),
            badge_text: formData.get('badge_text') || '',
            plan_level: planLevel,
            amount: parseFloat(formData.get('amount')),
            reward_multiplier: parseFloat(formData.get('reward_multiplier')),
            daily_earning_limit: parseFloat(formData.get('daily_earning_limit')),
            max_tasks_per_day: parseInt(formData.get('max_tasks_per_day')),
            duration_days: parseInt(formData.get('duration')),
            active: true
        };

        submitButton.disabled = true;
        submitButton.textContent = 'Saving...';

        try {
            const url = editingPlanId ? `/api/plans/${editingPlanId}/` : '/api/plans/';
            const method = editingPlanId ? 'PUT' : 'POST';

            const response = await apiFetch(url, {
                method: method,
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showToast(editingPlanId ? 'Plan updated successfully' : 'Plan created successfully', 'success');
                closePlanModal();
                await loadPlans();
            } else {
                const errData = await response.json().catch(() => ({}));
                const errMsg = typeof errData === 'object' ? JSON.stringify(errData) : 'Error saving plan';
                showToast('Error: ' + errMsg, 'error');
            }
        } catch (error) {
            console.error('Error saving plan:', error);
            showToast('Error saving plan', 'error');
        } finally {
            // Restore submit button state (fix variable name typo)
            submitButton.disabled = false;
            submitButton.textContent = 'Save Plan';
        }
    });

    async function deletePlan(planId) {
        if (!confirm('Are you sure you want to delete this plan?')) {
            return;
        }

        try {
            const response = await apiFetch(`/api/plans/${planId}/`, {
                method: 'DELETE'
            });

            const data = await response.json().catch(() => ({}));
            if (response.ok) {
                showToast(data.message || 'Plan deleted successfully', 'success');
                loadPlans();
            } else {
                showToast(data.error || 'Error deleting plan', 'error');
            }
        } catch (error) {
            console.error('Error deleting plan:', error);
            showToast('Error deleting plan', 'error');
        }
    }

    // Close modal when clicking outside
    window.onclick = function (event) {
        const modal = document.getElementById('plan-modal');
        if (event.target === modal) {
            closePlanModal();
        }
    }
</script>
{% endblock %}
