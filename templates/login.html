{% extends "base.html" %}

{% block content %}
<style>
/* ===== LOGIN PAGE STYLES ===== */
.login-container {
    min-height: calc(100vh - var(--header-height) - 400px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
}
.login-card {
    width: 100%;
    max-width: 440px;
    background: var(--bg-card);
    border-radius: var(--radius-xl);
    padding: 48px;
    box-shadow: var(--shadow-xl);
    border: 1px solid var(--border);
}
.login-header {
    text-align: center;
    margin-bottom: 40px;
}
.login-logo {
    width: 64px;
    height: 64px;
    margin: 0 auto 24px;
    background: var(--gradient-primary);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    justify-content: center;
}
.login-logo svg {
    width: 32px;
    height: 32px;
    color: white;
}
.login-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
}
.login-subtitle {
    font-size: 0.9375rem;
    color: var(--text-secondary);
}
.login-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
}
.form-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
}
.form-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text);
}
.form-input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    font-size: 0.9375rem;
    font-family: var(--font-family);
    background: var(--bg);
    color: var(--text);
    transition: all var(--transition);
}
.form-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}
.form-input::placeholder {
    color: var(--text-muted);
}
.login-button {
    width: 100%;
    padding: 14px;
    background: var(--gradient-primary);
    color: white;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
}
.login-button:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-lg);
}
.login-divider {
    display: flex;
    align-items: center;
    margin: 24px 0;
}
.login-divider::before,
.login-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
}
.login-divider span {
    padding: 0 16px;
    font-size: 0.875rem;
    color: var(--text-muted);
}
.login-footer {
    text-align: center;
    margin-top: 24px;
}
.login-footer-text {
    font-size: 0.875rem;
    color: var(--text-secondary);
}
.login-footer-link {
    color: var(--primary);
    font-weight: 500;
}
.login-footer-link:hover {
    color: var(--primary-hover);
}
.error-message {
    background: var(--danger-light);
    color: var(--danger);
    padding: 12px 16px;
    border-radius: var(--radius-md);
    font-size: 0.875rem;
    margin-bottom: 20px;
    border-left: 4px solid var(--danger);
}

/* ===== RESPONSIVE - MOBILE FIRST ===== */
@media (max-width: 768px) {
    .login-container {
        padding: 40px 20px;
        min-height: calc(100vh - 140px);
    }
    
    .login-card {
        padding: 32px 24px;
        border-radius: 16px;
    }
    
    .login-header {
        margin-bottom: 32px;
    }
    
    .login-logo {
        width: 56px;
        height: 56px;
        margin-bottom: 20px;
    }
    
    .login-logo svg {
        width: 28px;
        height: 28px;
    }
    
    .login-title {
        font-size: 1.5rem;
    }
    
    .login-subtitle {
        font-size: 0.875rem;
    }
    
    .login-form {
        gap: 16px;
    }
    
    .form-input {
        padding: 14px 16px;
        font-size: 16px; /* Prevents zoom on iOS */
        min-height: 48px;
    }
    
    .login-button {
        padding: 14px;
        min-height: 48px;
        font-size: 1rem;
    }
    
    .error-message {
        font-size: 0.85rem;
        padding: 12px 14px;
    }
}

@media (max-width: 480px) {
    .login-container {
        padding: 32px 16px;
    }
    
    .login-card {
        padding: 24px 20px;
        border-radius: 12px;
    }
    
    .login-header {
        margin-bottom: 24px;
    }
    
    .login-logo {
        width: 48px;
        height: 48px;
        margin-bottom: 16px;
    }
    
    .login-logo svg {
        width: 24px;
        height: 24px;
    }
    
    .login-title {
        font-size: 1.25rem;
    }
    
    .login-subtitle {
        font-size: 0.8rem;
    }
    
    .form-group {
        gap: 6px;
    }
    
    .form-label {
        font-size: 0.8rem;
    }
    
    .login-form {
        gap: 14px;
    }
    
    .login-button {
        padding: 12px;
        font-size: 0.95rem;
    }
}
</style>

<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-logo">
                <svg viewBox="0 0 32 32" fill="none">
                    <rect width="32" height="32" rx="8" fill="white" fill-opacity="0.2"/>
                    <path d="M16 8L24 16L16 24L8 16L16 8Z" fill="white"/>
                </svg>
            </div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to your Profitex account</p>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-button">Sign In</button>
        </form>

        <div class="login-divider">
            <span>or</span>
        </div>

        <div class="login-footer">
            <p class="login-footer-text">Don't have an account? <a href="/register/" class="login-footer-link">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}
